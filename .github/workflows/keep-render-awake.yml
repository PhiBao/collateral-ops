name: Keep Render Preview Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Canton JSON API
        env:
          RENDER_KEEPALIVE_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}
        run: |
          if [ -z "${RENDER_KEEPALIVE_URL:-}" ]; then
            echo "RENDER_KEEPALIVE_URL secret is not set; skipping keep-awake ping."
            exit 0
          fi

          base_url="${RENDER_KEEPALIVE_URL%/}"
          echo "Pinging ${base_url}/livez"
          curl --fail --silent --show-error --location \
            --max-time 45 \
            --retry 3 \
            --retry-delay 15 \
            "${base_url}/livez" >/dev/null
